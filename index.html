<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frères Cabrera</title>
  <link rel="stylesheet" href="https://use.typekit.net/psc3ebh.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <section class="hero-scroll" id="heroSection">
    <div class="hero-sticky">
      <img class="hero-img" id="heroImg" src="img/video/vid/video_00000.jpg" alt="" />
      <img class="hero-logo" src="img/logo.png" alt="Frères" />

      <div class="hero-text" id="heroText">
        <div class="hero-text-main">
          <span class="hero-text-small">Acompañando al</span>

          <svg class="hero-text-script-svg" id="bonVivantSvg"
               viewBox="0 0 879.25 320"
               xmlns="http://www.w3.org/2000/svg" aria-label="Bon Vivant">
            <text id="bonVivantText"
              transform="translate(0 257.03)"
              style="font-family:'ParfumerieScript-Regular','Parfumerie Script','parfumerie-script';font-size:311.55px;"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-dasharray="20000"
              stroke-dashoffset="20000"
            ><tspan x="0" y="0">Bon Vivant</tspan></text>
          </svg>

          <span class="hero-text-small">en su camino de héroe</span>
        </div>

        <div class="hero-text-identity">
          <span class="hero-text-name">Manuel Belgrano</span>
          <span class="hero-text-role">Vocero de la reunión</span>
        </div>
      </div>

      <div class="hotspot" id="hotspot" style="left:61%;top:52%;">
        <div class="hotspot-cross"></div>
      </div>
      <div class="hotspot" id="hotspot2" style="left:35%;top:72%;">
        <div class="hotspot-cross"></div>
      </div>

      <div class="product-card" id="productCard">
        <div class="product-card-img">
          <img src="img/buzo.png" alt="Buzo Polo Frères" />
        </div>
        <div class="product-card-info">
          <p class="product-card-name">Buzo Polo Fréres - Negro</p>
          <p class="product-card-price">$70.000</p>
          <p class="product-card-installments">Mismo precio en 6 cuotas de $11.667</p>
          <button class="product-card-btn">Añadir al carrito</button>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
