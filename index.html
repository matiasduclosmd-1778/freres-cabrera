<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frères Cabrera</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23000'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Helvetica,Arial,sans-serif' font-weight='700' font-size='14' fill='%23fff'>FC</text></svg>" />
  <link rel="stylesheet" href="https://use.typekit.net/psc3ebh.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #000; overflow-x: hidden; cursor: none; }

    /* ── CURSOR ── */
    .cursor {
      position: fixed; top: 0; left: 0;
      width: 10px; height: 10px;
      background: #fff; border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    /* ── HERO ── */
    .hero-scroll  { position: relative; height: 250vh; }
    .hero-sticky  { position: sticky; top: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .hero-canvas  { position: absolute; inset: 0; width: 100%; height: 100%; }

    .hero-logo {
      position: relative; z-index: 10;
      width: clamp(280px, 55vw, 900px);
      filter: invert(1); mix-blend-mode: screen;
      pointer-events: none; user-select: none;
    }

    /* ── HERO TEXT ── */
    .hero-text { position: absolute; inset: 0; z-index: 15; opacity: 0; pointer-events: none; }

    .hero-text-main {
      position: absolute; left: 4%; top: 28%;
      display: flex; flex-direction: column;
    }

    .hero-text-small {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(15px, 1.8vw, 24px);
      color: #fff;
      letter-spacing: 0.01em;
      line-height: 1.4;
    }

    .hero-text-script-svg {
      display: block;
      width: clamp(220px, 37vw, 560px);
      height: auto;
      overflow: visible;
      margin: -1vw 0 0 -8px;
    }

    .hero-text-script-svg + .hero-text-small {
      margin-top: -0.4vw;
      padding-left: 2vw;
    }

    .hero-text-identity {
      position: absolute; right: 4%; bottom: 8%;
      text-align: right;
    }

    .hero-text-name {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: clamp(15px, 1.4vw, 22px);
      color: #fff;
      display: block;
      letter-spacing: 0.01em;
      line-height: 1.3;
    }

    .hero-text-role {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(12px, 1vw, 16px);
      color: #fff;
      display: block;
      letter-spacing: 0.02em;
      line-height: 1.4;
      opacity: 0.85;
    }

    /* ── GRAIN ── */
    .grain-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
      opacity: 0.13; mix-blend-mode: overlay;
    }

    /* ── HOTSPOT ── */
    .hotspot {
      position: absolute; transform: translate(-50%, -50%);
      z-index: 30; opacity: 0; cursor: pointer; padding: 12px;
      pointer-events: none;
    }
    .hotspot-cross { width: 38px; height: 38px; position: relative; transition: transform 0.25s ease; }
    .hotspot:hover .hotspot-cross { transform: scale(1.2); }
    .hotspot-cross::before, .hotspot-cross::after { content: ''; position: absolute; background: rgba(255,255,255,0.85); }
    .hotspot-cross::before { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .hotspot-cross::after  { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }

    /* ── PRODUCT CARD ── */
    .product-card { position: absolute; right: 4%; top: 50%; transform: translateY(-50%); width: 280px; background: #eeede9; z-index: 20; opacity: 0; pointer-events: none; }
    .product-card-img { width: 100%; padding: 28px 24px 12px; }
    .product-card-img img { width: 100%; display: block; }
    .product-card-info { padding: 4px 20px 24px; }
    .product-card-name { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 1px; }
    .product-card-price { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .product-card-installments { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; color: #d93025; margin-bottom: 18px; line-height: 1.4; }
    .product-card-btn { display: block; width: 100%; background: #111; color: #fff; border: none; padding: 15px; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; cursor: pointer; transition: background 0.3s; }
    .product-card-btn:hover { background: #333; }

    /* ── MOBILE ── */
    @media (pointer: coarse) {
      body { cursor: auto; }
      .cursor { display: none; }
    }

    @media (max-width: 768px) {
      .hero-text-script-svg { width: clamp(140px, 52vw, 240px); }

      .hotspot { padding: 18px; }
      .hotspot-cross { width: 30px; height: 30px; }

      .product-card {
        right: auto;
        left: 16px;
        top: auto;
        bottom: 48px;
        transform: none;
        width: calc(100vw - 32px);
        max-width: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <section class="hero-scroll" id="heroSection">
    <div class="hero-sticky">
      <canvas class="hero-canvas" id="heroCanvas"></canvas>
      <canvas class="grain-canvas" id="grainCanvas"></canvas>
      <img class="hero-logo" src="img/logo.png" alt="Frères" />

      <div class="hero-text" id="heroText">
        <div class="hero-text-main">
          <span class="hero-text-small">Acompañando al</span>

          <svg class="hero-text-script-svg" id="bonVivantSvg"
               viewBox="0 0 879.25 320"
               xmlns="http://www.w3.org/2000/svg" aria-label="Bon Vivant">
            <text id="bonVivantText"
              transform="translate(0 257.03)"
              style="font-family:'ParfumerieScript-Regular','Parfumerie Script','parfumerie-script';font-size:311.55px;"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-dasharray="20000"
              stroke-dashoffset="20000"
            ><tspan x="0" y="0">Bon Vivant</tspan></text>
          </svg>

          <span class="hero-text-small">en su camino de héroe</span>
        </div>

        <div class="hero-text-identity">
          <span class="hero-text-name">Manuel Belgrano</span>
          <span class="hero-text-role">Vocero de la reunión</span>
        </div>
      </div>

      <div class="hotspot" id="hotspot" style="left:61%;top:52%;">
        <div class="hotspot-cross"></div>
      </div>
      <div class="hotspot" id="hotspot2" style="left:35%;top:72%;">
        <div class="hotspot-cross"></div>
      </div>

      <div class="product-card" id="productCard">
        <div class="product-card-img">
          <img src="img/buzo.png" alt="Buzo Polo Frères" />
        </div>
        <div class="product-card-info">
          <p class="product-card-name">Buzo Polo Fréres - Negro</p>
          <p class="product-card-price">$70.000</p>
          <p class="product-card-installments">Mismo precio en 6 cuotas de $11.667</p>
          <button class="product-card-btn">Añadir al carrito</button>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    // ── FRAME SEQUENCE ─────────────────────────────────────────────
    const canvas = document.getElementById('heroCanvas');
    const ctx    = canvas.getContext('2d');
    const TOTAL  = 73;

    const frames = Array.from({ length: TOTAL }, (_, i) => {
      const img = new Image();
      img.src = `img/seq/frame_${String(i).padStart(5, '0')}.jpg`;
      return img;
    });

    function resize() {
      const dpr     = window.devicePixelRatio || 1;
      canvas.width  = canvas.offsetWidth  * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      draw(proxy.frame);
    }

    function draw(index) {
      const i   = Math.round(Math.max(0, Math.min(TOTAL - 1, index)));
      const img = frames[i];
      if (!img.complete || !img.naturalWidth) return;
      const scale = Math.max(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight);
      const w = img.naturalWidth  * scale, h = img.naturalHeight * scale;
      const x = (canvas.width  - w) / 2,  y = (canvas.height - h) / 2;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, x, y, w, h);
    }

    frames[0].onload = () => draw(0);

    const proxy = { frame: 0 };

    gsap.to('.hero-logo', {
      opacity: 0, scale: 0.88, y: -40, ease: 'power3.inOut',
      scrollTrigger: { trigger: '#heroSection', start: 'top top', end: '10% top', scrub: 3 },
    });

    gsap.to(proxy, {
      frame: TOTAL - 1,
      snap: { snapTo: 1, duration: 0.1 },
      ease: 'none',
      scrollTrigger: { trigger: '#heroSection', start: 'top top', end: '40% top', scrub: 2 },
      onUpdate: () => draw(proxy.frame),
    });

    // ── CALLIGRAPHY ────────────────────────────────────────────────
    const heroText   = document.getElementById('heroText');
    const hotspot    = document.getElementById('hotspot');
    const hotspot2   = document.getElementById('hotspot2');
    const bonVivant  = document.getElementById('bonVivantText');
    function playCalligraphy() {
      const len = bonVivant.getTotalLength?.() || 20000;
      gsap.fromTo(bonVivant,
        { strokeDasharray: len, strokeDashoffset: len },
        { strokeDashoffset: 0, duration: 3.2, ease: 'power2.inOut' }
      );
      gsap.fromTo(bonVivant,
        { fill: 'none' },
        { fill: 'white', duration: 1.5, ease: 'power2.in', delay: 1.2 }
      );
    }

    function resetCalligraphy() {
      const len = bonVivant.getTotalLength?.() || 20000;
      gsap.killTweensOf(bonVivant);
      gsap.set(bonVivant, { strokeDasharray: len, strokeDashoffset: len, fill: 'none' });
    }

    ScrollTrigger.create({
      trigger: '#heroSection',
      start: '37% top',
      end:   'bottom bottom',
      onEnter() {
        gsap.to(heroText, { opacity: 1, duration: 0.8, ease: 'power2.out' });
        playCalligraphy();
        gsap.to([hotspot, hotspot2], {
          opacity: 1, duration: 1, ease: 'power2.out', stagger: 0.15,
          onComplete: () => {
            hotspot.style.pointerEvents  = 'auto';
            hotspot2.style.pointerEvents = 'auto';
          },
        });
      },
      onLeaveBack() {
        gsap.to(heroText,            { opacity: 0, duration: 0.4, ease: 'power2.in' });
        gsap.to([hotspot, hotspot2], { opacity: 0, duration: 0.4, ease: 'power2.in' });
        hotspot.style.pointerEvents  = 'none';
        hotspot2.style.pointerEvents = 'none';
        closeCard();
        resetCalligraphy();
      },
    });

    // ── PRODUCT CARD ───────────────────────────────────────────────
    const productCard = document.getElementById('productCard');
    gsap.set(productCard, { transformOrigin: isTouch ? 'left bottom' : 'right center' });
    let cardOpen = false, cardSticky = false;

    function openCard() {
      if (cardOpen) return;
      cardOpen = true;
      gsap.killTweensOf(productCard);
      productCard.style.pointerEvents = 'auto';
      gsap.fromTo(productCard,
        { opacity: 0, scale: 0.92, x: -16 },
        { opacity: 1, scale: 1,    x: 0, duration: 0.55, ease: 'power3.out' }
      );
    }

    function closeCard() {
      if (!cardOpen) return;
      cardOpen = false;
      cardSticky = false;
      gsap.killTweensOf(productCard);
      gsap.to(productCard, {
        opacity: 0, scale: 0.92, x: -16, duration: 0.35, ease: 'power2.in',
        onComplete: () => { productCard.style.pointerEvents = 'none'; },
      });
    }

    hotspot.addEventListener('mouseenter',  openCard);
    hotspot2.addEventListener('mouseenter', openCard);
    hotspot.addEventListener('mouseleave',  () => { if (!cardSticky) closeCard(); });
    hotspot2.addEventListener('mouseleave', () => { if (!cardSticky) closeCard(); });

    hotspot.addEventListener('click',  () => { cardSticky = true; openCard(); });
    hotspot2.addEventListener('click', () => { cardSticky = true; openCard(); });

    document.addEventListener('click', e => {
      if (!cardOpen) return;
      if (productCard.contains(e.target) || hotspot.contains(e.target) || hotspot2.contains(e.target)) return;
      closeCard();
    });

    // ── TOUCH DETECTION ────────────────────────────────────────────
    const isTouch = window.matchMedia('(pointer: coarse)').matches;

    // ── GRAIN ──────────────────────────────────────────────────────
    const grainCanvas = document.getElementById('grainCanvas');
    const grainCtx    = grainCanvas.getContext('2d');
    grainCtx.imageSmoothingEnabled = false;
    const grainSize   = isTouch ? 256 : 512;
    const grainOff    = document.createElement('canvas');
    grainOff.width = grainOff.height = grainSize;
    const grainOffCtx = grainOff.getContext('2d');

    function resizeGrain() {
      grainCanvas.width  = grainCanvas.offsetWidth;
      grainCanvas.height = grainCanvas.offsetHeight;
    }

    (function tickGrain() {
      const d = grainOffCtx.createImageData(grainSize, grainSize);
      for (let i = 0; i < d.data.length; i += 4) {
        const v = Math.random() * 255 | 0;
        d.data[i] = d.data[i + 1] = d.data[i + 2] = v;
        d.data[i + 3] = 255;
      }
      grainOffCtx.putImageData(d, 0, 0);
      grainCtx.drawImage(grainOff, 0, 0, grainCanvas.width, grainCanvas.height);
      requestAnimationFrame(tickGrain);
    }());

    // ── CURSOR ─────────────────────────────────────────────────────
    if (!isTouch) {
      const cursor = document.getElementById('cursor');
      const mouse  = { x: innerWidth / 2, y: innerHeight / 2 };
      window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
      gsap.ticker.add(() => {
        gsap.to(cursor, { x: mouse.x, y: mouse.y, duration: 0.45, ease: 'power3.out', overwrite: 'auto' });
      });
    }

    // ── SNAP ───────────────────────────────────────────────────────
    const heroSection = document.getElementById('heroSection');
    let snapping = false;

    function scrollToY(target) {
      snapping = true;
      const proxy = { y: window.scrollY };
      gsap.to(proxy, {
        y: target, duration: 1.7, ease: 'power2.inOut',
        onUpdate()   { window.scrollTo(0, proxy.y); },
        onComplete() { snapping = false; },
      });
    }

    if (!isTouch) {
      window.addEventListener('wheel', e => {
        const scrollY = window.scrollY;
        const heroEnd = heroSection.offsetHeight - window.innerHeight;
        if (scrollY < 0 || scrollY > heroEnd) return;
        if (snapping) { e.preventDefault(); return; }
        const goingDown = e.deltaY > 0;
        if (goingDown && scrollY >= heroEnd) return;
        if (!goingDown && scrollY <= 0) return;
        e.preventDefault();
        scrollToY(goingDown ? heroEnd : 0);
      }, { passive: false });
    } else {
      let snapTimeout;
      window.addEventListener('scroll', () => {
        if (snapping) return;
        clearTimeout(snapTimeout);
        snapTimeout = setTimeout(() => {
          const scrollY = window.scrollY;
          const heroEnd = heroSection.offsetHeight - window.innerHeight;
          if (scrollY <= 0 || scrollY >= heroEnd) return;
          scrollToY(scrollY < heroEnd / 2 ? 0 : heroEnd);
        }, 160);
      }, { passive: true });
    }

    // ── INIT ───────────────────────────────────────────────────────
    window.addEventListener('resize', resize);
    window.addEventListener('resize', resizeGrain);
    resize();
    resizeGrain();
  </script>
</body>
</html>
